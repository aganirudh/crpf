services:
  postgres:
    image: postgres:16-alpine
    container_name: pramaan-postgres
    environment:
      POSTGRES_USER: pramaan
      POSTGRES_PASSWORD: pramaan
      POSTGRES_DB: pramaan
    ports:
      # Windows often already has a local `postgres.exe` service on 5432.
      # Use 5433 on the host to avoid conflicts.
      - "5433:5432"
    volumes:
      - pramaan-pg-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pramaan -d pramaan"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: pramaan-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pramaan
      MINIO_ROOT_PASSWORD: pramaanpramaan
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pramaan-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: pramaan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 pramaan pramaanpramaan;
        mc mb --ignore-existing local/pramaan;
        mc anonymous set none local/pramaan;
        echo 'MinIO bucket pramaan ready';
      "

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: pramaan-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - pramaan-qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  opa:
    image: openpolicyagent/opa:0.70.0
    container_name: pramaan-opa
    command:
      - "run"
      - "--server"
      - "--addr=:8181"
      - "--log-level=info"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ../backend/policies:/policies:ro

volumes:
  pramaan-pg-data:
    name: pramaan-pg-data
  pramaan-minio-data:
    name: pramaan-minio-data
  pramaan-qdrant-data:
    name: pramaan-qdrant-data
